version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: billing-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: billing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  billing:
    build: .
    container_name: billing-service
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: "postgresql://postgres:postgrespassword@postgres:5432/billing_db?schema=public"
      DEFAULT_PAYMENT_PROVIDER: mock
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_mock_secret}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_mock}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_mock_id}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-rzp_test_mock_secret}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-whsec_rzp_mock}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma db push && npm start"

volumes:
  postgres_data:
